theater_zu_neutral_v2:
  alias: 'Theater: Zu Neutral (Farbe→Weiß, oder Aus→75%)'
  icon: mdi:lightbulb-auto
  mode: restart
  description: >-
    Mindestens eine Lampe an: sanft auf Neutralweiß (per Master-Helligkeit) mit
    Transition; kein abschließender theater_neutral_v2-Aufruf (der setzt transition
    0 und würde die Überblendung verwischen). Skip-Text auf Neutral setzen. Alle
    aus: langsam auf Neutralweiß 75 % (Slider 750).
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: >
          {{ expand(['light.l1','light.l2','light.l3','light.l4','light.l5','light.l6','light.l7','light.l8','light.l9','light.l10','light.l11','light.l12'])
             | selectattr('state', 'eq', 'on') | list | length == 0 }}
      sequence:
        - action: script.turn_on
          target:
            entity_id: script.theater_master_stop_v2
        - action: input_number.set_value
          target:
            entity_id: input_number.theater_master_brightness
          data:
            value: 750
        - action: light.turn_on
          target:
            entity_id:
            - light.l1
            - light.l2
            - light.l3
            - light.l4
            - light.l5
            - light.l6
            - light.l7
            - light.l8
            - light.l9
            - light.l10
            - light.l11
            - light.l12
          data:
            rgb_color: '{% set c = states(''input_text.theater_farbe_neutral'') %}{{ (c
              if '','' in c else ''255,255,255'').split('','') | map(''int'') | list }}'
            brightness_pct: 75
            transition: 4
        - delay:
            seconds: 4
        - action: input_text.set_value
          target:
            entity_id: input_text.theater_master_stop_skip
          data:
            value: script.theater_neutral_v2
    default:
      - action: script.turn_on
        target:
          entity_id: script.theater_master_stop_v2
      - action: light.turn_on
        target:
          entity_id:
          - light.l1
          - light.l2
          - light.l3
          - light.l4
          - light.l5
          - light.l6
          - light.l7
          - light.l8
          - light.l9
          - light.l10
          - light.l11
          - light.l12
        data:
          rgb_color: '{% set c = states(''input_text.theater_farbe_neutral'') %}{{ (c
            if '','' in c else ''255,255,255'').split('','') | map(''int'') | list }}'
          brightness_pct: '{{ [(states(''input_number.theater_master_brightness'') | float(500)
            / 10) | int, 100] | min }}'
          transition: 5
      - delay:
          seconds: 5
      - action: input_text.set_value
        target:
          entity_id: input_text.theater_master_stop_skip
        data:
          value: script.theater_neutral_v2

theater_grau_v2:
  alias: 'Theater: Grau v2'
  icon: mdi:cloud
  mode: restart
  fields:
    skip_entity_id:
      description: Veraltet – ignoriert
      required: false
      selector:
        text: {}
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_grau_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - action: light.turn_on
    target:
      entity_id:
      - light.l1
      - light.l2
      - light.l3
      - light.l4
      - light.l5
      - light.l6
      - light.l7
      - light.l8
      - light.l9
      - light.l10
      - light.l11
      - light.l12
    data:
      rgb_color: '{% set c = states(''input_text.theater_farbe_grau'') %}{{ (c if
        '','' in c else ''252,237,252'').split('','') | map(''int'') | list }}'
      brightness_pct: 1
      transition: 0
  - variables:
      s: '{{ states(''input_number.theater_master_speed'') | int(50) }}'
  - delay: 00:00:01
  - repeat:
      while:
      - condition: template
        value_template: 'true'
      sequence:
      - action: light.turn_on
