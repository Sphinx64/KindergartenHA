          lamp_num: '{{ range(1, 13) | list | shuffle | reject(''equalto'', last_lamp
            | int) | first }}'
      - variables:
          drop_idx: '{{ drop_idx + 1 }}'
          last_lamp: '{{ lamp_num }}'
      - action: script.turn_on
        target:
          entity_id: script.theater_tranen_helper_v2
