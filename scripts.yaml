          entity_id:
          - light.l1
          - light.l2
          - light.l3
          - light.l4
          - light.l5
          - light.l6
          - light.l7
          - light.l8
          - light.l9
          - light.l10
          - light.l11
          - light.l12
        data:
          rgb_color: '{% set c = states(''input_text.theater_farbe_grau'') %}{{ (c
            if '','' in c else ''252,237,252'').split('','') | map(''int'') | list
            }}'
          brightness_pct: 1
          transition: '{{ [3.5 - (s / 100.0) * 3.2, 0.2] | max | round(2) }}'
      - delay:
          seconds: '{{ [3.8 - (s / 100.0) * 3.5, 0.3] | max | round(1) }}'
      - action: light.turn_on
        target:
          entity_id:
          - light.l1
          - light.l2
          - light.l3
          - light.l4
          - light.l5
          - light.l6
          - light.l7
          - light.l8
          - light.l9
          - light.l10
          - light.l11
          - light.l12
        data:
          rgb_color: '{% set c = states(''input_text.theater_farbe_grau'') %}{{ (c
            if '','' in c else ''252,237,252'').split('','') | map(''int'') | list
            }}'
          brightness_pct: 1
          transition: '{{ [3.5 - (s / 100.0) * 3.2, 0.2] | max | round(2) }}'
      - delay: '00:00:03.5'

