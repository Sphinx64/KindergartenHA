    target:
      entity_id: script.theater_streit_phase_1_v2
theater_streit_next:
  alias: 'Theater: Streit Weiter'
  icon: mdi:skip-next
  mode: restart
  sequence:
  - variables:
      current_phase: '{{ ''3'' if is_state(''script.theater_streit_phase_3_v2'',
        ''on'') else ''2'' if is_state(''script.theater_streit_phase_2_v2'', ''on'')
        else ''1'' }}'
  - variables:
      next_phase: '{{ [current_phase | int + 1, 3] | min }}'
  - action: script.theater_master_stop_v2
  - action: script.turn_on
    target:
      entity_id: "script.theater_streit_phase_{{ next_phase }}_v2"
theater_streit_prev:
  alias: 'Theater: Streit Zurück'
  icon: mdi:skip-previous
  mode: restart
  sequence:
  - variables:
      current_phase: '{{ ''1'' if is_state(''script.theater_streit_phase_1_v2'',
        ''on'') else ''2'' if is_state(''script.theater_streit_phase_2_v2'', ''on'')
        else ''3'' }}'
  - variables:
      prev_phase: '{{ [current_phase | int - 1, 1] | max }}'
  - action: script.theater_master_stop_v2
  - action: script.turn_on
    target:
      entity_id: "script.theater_streit_phase_{{ prev_phase }}_v2"
theater_fade_to_black_v2:
  alias: 'Theater: Fade to Black'
  icon: mdi:weather-night
  mode: restart
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_fade_to_black_v2
  - action: script.theater_master_stop_v2
  - repeat:
      count: 20
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.l1
          - light.l2
          - light.l3
          - light.l4
          - light.l5
          - light.l6
          - light.l7
          - light.l8
          - light.l9
          - light.l10
          - light.l11
          - light.l12
        data:
          brightness_step_pct: -5
      - delay:
          milliseconds: 125
  - action: light.turn_off
    target:
      entity_id:
      - light.l1
      - light.l2
      - light.l3
      - light.l4
      - light.l5
      - light.l6
      - light.l7
      - light.l8
      - light.l9
      - light.l10
      - light.l11
      - light.l12
    data:
      transition: 0
