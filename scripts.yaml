    data:
      value: script.theater_tranen_v2
  - action: script.theater_master_stop_v2
  - variables:
      drop_colors:
      - 0
      - 240
      - 60
      - 300
      - 120
      - 180
      - 30
      - 270
      - 90
      - 210
      - 150
      - 330
      drop_idx: 0
      last_lamp: 0
