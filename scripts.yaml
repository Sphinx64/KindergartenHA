      milliseconds: '{{ range(100, 2500) | random }}'
  - repeat:
      while:
      - condition: template
        value_template: 'true'
      sequence:
      - variables:
          s: '{{ states(''input_number.theater_master_speed'') | int(50) }}'
          flash_name: '{{ flash1_name if (range(2) | random) == 0 else flash2_name
            }}'
          flash_ms: '{{ [(280 - s * 2) | int, 90] | max | int }}'
          wait_ms: '{{ [(2500 - s * 22) | int, 200] | max | int + (range(0, 800) |
            random) }}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{% set fs = states(''input_text.theater_farbe_'' ~ flash_name)
            %}{{ (fs if '','' in fs else ''255,255,255'').split('','') | map(''int'')
            | list }}'
          brightness_pct: 100
          transition: 0
      - delay:
          milliseconds: '{{ flash_ms }}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{% set bs = states(''input_text.theater_farbe_'' ~ base_name)
            %}{{ (bs if '','' in bs else ''255,255,255'').split('','') | map(''int'')
            | list }}'
          brightness_pct: 50
          transition: 0.2
      - delay:
          milliseconds: '{{ wait_ms }}'

theater_streit_chaos_helper_v2:
  alias: 'Theater: Streit Chaos Helper'
  icon: mdi:shuffle-variant
  mode: parallel
  max: 12
  description: >-
    4s volle Helligkeit mit R/B/G-Rotation, 8s nur Abdunkeln (Helligkeit);
    Farben bleiben gesättigt, keine Entsättigung. 12s, ab 4s etwas längere
    Pausen zum Entlasten.
  fields:
    lamp:
      description: Ziel-Lampen-Entity
  sequence:
  - variables:
      chaos_start: '{{ now().timestamp() | float(0) }}'
  - repeat:
      while:
      - condition: template
        value_template: '{{ (now().timestamp() - (chaos_start | float(0))) < 12.0 }}'
      sequence:
      - variables:
          streit_chaos_n: '{{ (streit_chaos_n | default(0) | int) + 1 }}'
      - variables:
          elapsed: "{{ (now().timestamp() | float(0)) - (chaos_start | float(0)) }}"
      - variables:
          s: '{{ states(''input_number.theater_master_speed'') | int(50) }}'
      - variables:
          t_cha: "{{ elapsed | float(0) }}"
      - variables:
          chaos_kf: "{{ 0.0 if (t_cha | float(0)) < 4.0 else (([1.0, [0.0, ((t_cha | float(0) - 4.0) / 8.0)] | max] | min) | float(0)) }}"
      - variables:
          chaos_env: "{{ (100.0 * (1.0 - ((chaos_kf | float(0)) ** 1.18))) | float(0) }}"
      - variables:
          chaos_master_pct: "{{ [((states('input_number.theater_master_brightness') | float(500) / 10) | int(50)), 100] | min | int }}"
      - variables:
          chaos_bright: "{{ 0 if (chaos_env | float(0)) < 0.5 else (((chaos_env | float(0)) * (chaos_master_pct | int(0)) / 100.0) | round(0) | int) }}"
      - variables:
          chaos_tran: "{{ 0.12 if t_cha | float(0) < 4.0 else 0.5 }}"
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          rgb_color: '{% set li = lamp | replace(''light.l'', '''') | int(1) %}{% set names = [''gelb'', ''blau'', ''rot''] %}{% set idx = (li + (streit_chaos_n | int(0))) % 3 %}{% set cs = states(''input_text.theater_farbe_'' ~ names[idx]) %}{% set p = (cs if '','' in cs else ''255,255,255'').split('','') | map(''int'') | list %}{{ [p[0] | int, p[1] | int, p[2] | int] }}'
          brightness_pct: "{{ chaos_bright | int(0) }}"
          transition: "{{ chaos_tran | float(0) }}"
      - delay:
          milliseconds: '{{ ( (220 if t_cha | float(0) >= 4.0 else 0) + ([(155 - s) | int, 100] | max) + ( ((now().timestamp() * 1000) | int + (lamp | replace(''light.l'', '''') | int(1)) * 13) % 120 ) ) | int(0) }}'

