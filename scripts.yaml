theater_finale_helper_v2:
  alias: 'Theater: Finale Helper'
  icon: mdi:palette
  mode: parallel
  max: 12
  description: 'Eine Lampe, endloser Regenbogen per HS-Fade (hue dreht pro Zyklus
    360°). Nicht Tropfen/Regen: nur gleichmässige Uebergänge (transition + Schritt).'
  fields:
    lamp:
      description: Lampen-Entity-ID
    start_hue:
      description: Start-Farbton (0-359)
  sequence:
  - variables:
      start_time: '{{ now().timestamp() | float(0) }}'
  - repeat:
      while:
      - condition: template
        value_template: 'true'
      sequence:
      - variables:
          s: '{{ states(''input_number.theater_master_speed'') | float(50) }}'
      - variables:
          cycle_sec: '{{ [6, 60 - s * 0.54] | max | round(1) }}'
      - variables:
          step_sec: '{{ [0.2, cycle_sec / 72] | max | round(2) }}'
      - variables:
          elapsed: "{{ (now().timestamp() | float(0)) - (start_time | float(0)) }}"
      - variables:
          hue: "{{ ((start_hue | float(0) + (elapsed / (cycle_sec if cycle_sec > 0 else 1) * 360)) % 360) | round(1) }}"
      - variables:
          br: '{{ [(states(''input_number.theater_master_brightness'') | float(500)
            / 10) | int, 100] | min }}'
      - action: light.turn_on
        target:
          entity_id: '{{ lamp }}'
        data:
          hs_color:
          - '{{ hue }}'
          - 100
          brightness_pct: '{{ br }}'
          transition: '{{ step_sec }}'
      - delay: '{{ step_sec }}'

