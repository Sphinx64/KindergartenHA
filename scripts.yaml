theater_streit_flash_helper_v2:
  alias: 'Theater: Streit Flash Helper'
  icon: mdi:flash
  mode: parallel
  max: 50
  fields:
    lamp:
      description: Ziel-Lampen-Entity (z.B. light.l1)
    base_name:
      description: 'Basisfarbe: ''gelb'' | ''blau'' | ''rot'''
    flash1_name:
      description: Erste Flash-Farbe
    flash2_name:
      description: Zweite Flash-Farbe
  sequence:
