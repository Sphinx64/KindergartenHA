einzeltropfen:
  alias: Einzeltropfen
  mode: parallel
  max: 30
  fields:
    target_light:
      description: Welche Lampe?
    drop_color:
      description: Farbe als RGB-Liste
  sequence:
  - action: light.turn_on
    target:
      entity_id: '{{ target_light }}'
    data:
      rgb_color: '{{ drop_color }}'
      brightness_pct: 100
      transition: 0
  - delay:
      milliseconds: 400
  - action: light.turn_on
    target:
      entity_id: '{{ target_light }}'
    data:
      brightness_pct: 40
      transition: 0.35
  - delay:
      milliseconds: 400
  - action: light.turn_on
    target:
      entity_id: '{{ target_light }}'
    data:
      rgb_color: '{{ drop_color }}'
      brightness_pct: 12
      transition: 0.35
  - delay:
      milliseconds: 320
  - action: light.turn_off
    target:
      entity_id: '{{ target_light }}'
    data:
      transition: 2.1
  description: 'Tropfen: Flash, kurz abdimmen, dann ein stetiger Verlauf bis aus.'

theater_neutral_v2:
  alias: 'Theater: Neutral v2'
  icon: mdi:lightbulb-on-outline
  mode: restart
  sequence:
  - action: input_text.set_value
    target:
      entity_id: input_text.theater_master_stop_skip
    data:
      value: script.theater_neutral_v2
  - action: script.turn_on
    target:
      entity_id: script.theater_master_stop_v2
  - action: light.turn_on
    target:
      entity_id:
      - light.l1
      - light.l2
      - light.l3
      - light.l4
      - light.l5
      - light.l6
      - light.l7
      - light.l8
      - light.l9
      - light.l10
      - light.l11
      - light.l12
    data:
      rgb_color: '{% set c = states(''input_text.theater_farbe_neutral'') %}{{ (c
        if '','' in c else ''255,255,255'').split('','') | map(''int'') | list }}'
      brightness_pct: '{{ [(states(''input_number.theater_master_brightness'') | float(500)
        / 10) | int, 100] | min }}'
      transition: 0

