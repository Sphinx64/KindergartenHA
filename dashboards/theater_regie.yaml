                        entity_id: script.beamer_power
                  - type: button
                    name: Fokus
                    icon: mdi:image-filter-center-focus
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.beamer_fokus
                  - type: button
                    name: Fokus 2099 (ADB)
                    icon: mdi:usb
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.beamer_fokus_adb_2099
          - type: vertical-stack
            cards:
              - type: markdown
                content: "**Master** (Schieberegler)"
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: input_number.theater_master_brightness
                    name: Hell %
                  - entity: input_number.theater_master_speed
                    name: Speed
  - type: masonry
    path: alternativ
    title: Alternativ
    cards:
      - type: button
        name: Finale (Regenbogen)
        show_name: true
        icon: mdi:gradient-horizontal
        tap_action:
          action: perform-action
          perform_action: script.turn_on
          target:
            entity_id: script.theater_finale_v2
      - type: entities
        title: Bühnenlichter
        entities:
          - light.buhnenlichter_alle
