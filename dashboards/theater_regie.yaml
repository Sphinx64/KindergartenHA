                        entity_id: script.helligkeitsregler_40
                  - type: button
                    name: "50"
                    show_icon: false
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.helligkeitsregler_50
                  - type: button
                    name: "60"
                    show_icon: false
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
