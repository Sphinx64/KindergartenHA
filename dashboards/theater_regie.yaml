                        entity_id: script.beamer_home
                  - type: button
                    name: Zurück
                    icon: mdi:arrow-left
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.beamer_zurueck
                  - type: button
                    name: Leiser
                    icon: mdi:volume-minus
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
