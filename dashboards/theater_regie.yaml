                        entity_id: script.helligkeitsregler_100
              - type: markdown
                content: "#### Geschw. (Skripte, 0 + 10er)"
              - type: grid
                columns: 5
                square: false
                cards:
                  - type: button
                    name: "0"
                    show_icon: false
