# Theater Regie – Skripte: script.theater_* / script.beamer_* / theater_blackout_screen (scripts.yaml); Tempo: theater_master_speed
title: Theater Regie
views:
  - title: Regie-Pult
    icon: mdi:theater
    panel: true
    cards:
      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: entities
                title: Notfall & Stop
                entities:
                  - entity: script.theater_master_stop_v2
                    name: Master Stop (Licht anlassen)
                    icon: mdi:stop-circle-outline
                    tap_action:
                      action: call-service
                      service: script.turn_on
                      target:
                        entity_id: script.theater_master_stop_v2
                  - entity: script.theater_fade_to_black_v2
                    name: Fade to Black (2,5s)
                    icon: mdi:weather-night
                  - entity: script.theater_blackout_v2
                    name: BLACKOUT (Sofort)
                    icon: mdi:power
              - type: markdown
                content: "#### Helligkeit % (Skripte)"
              - type: grid
                columns: 5
                square: false
                cards:
                  - type: button
                    name: "10"
                    show_icon: false
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.helligkeitsregler_10
                  - type: button
                    name: "20"
                    show_icon: false
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
